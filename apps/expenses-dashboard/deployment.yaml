apiVersion: apps/v1
kind: Deployment
metadata:
  name: expenses-dashboard
  namespace: expenses-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: expenses-dashboard
  template:
    metadata:
      labels:
        app: expenses-dashboard
        app.kubernetes.io/name: expenses-dashboard
    spec:
      nodeSelector:
        node-type: vps
      tolerations:
        - key: dedicated
          operator: Equal
          value: vps
          effect: NoSchedule

      containers:
        - name: expenses-dashboard
          image: ghcr.io/giagio546/expenses-dashboard:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4321

          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "4321"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: expenses-dashboard-secret
                  key: DATABASE_URL

          readinessProbe:
            httpGet:
              path: /
              port: 4321
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /
              port: 4321
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 6

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi