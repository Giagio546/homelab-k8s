apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: whoami
spec:
  replicas: 2
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
        - name: whoami
          image: traefik/whoami
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: whoami
spec:
  selector:
    app: whoami
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami
  namespace: whoami
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Whoami"
    gethomepage.dev/description: "Test ingress route"
    gethomepage.dev/group: "Kubernetes"
    gethomepage.dev/icon: "mdi-test-tube"
    gethomepage.dev/href: "http://whoami.k8s.home.arpa"
spec:
  ingressClassName: traefik
  rules:
    - host: whoami.k8s.home.arpa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whoami
                port:
                  number: 80