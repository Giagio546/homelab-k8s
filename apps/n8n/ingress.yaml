apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n
  namespace: n8n
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "n8n"
    gethomepage.dev/description: "Automation workflows"
    gethomepage.dev/group: "Home"
    gethomepage.dev/icon: "n8n.png"
    gethomepage.dev/href: "https://n8n.k8s.home.arpa"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - n8n.k8s.home.arpa
  rules:
    - host: n8n.k8s.home.arpa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n-web
                port:
                  number: 5678